name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Resolve version
        id: get_version
        run: |
          # Em build por tag, a tag manda; no dispatch manual cai pro build.gradle.kts
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          else
            VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
            TAG="v$VERSION"
          fi
          echo "TAG=$TAG"         >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building $TAG (version $VERSION)"

      - name: Check tag matches versionName
        if: github.ref_type == 'tag'
        run: |
          GRADLE_VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          if [ "$GRADLE_VERSION" != "${{ steps.get_version.outputs.VERSION }}" ]; then
            echo "::error::Tag ${{ steps.get_version.outputs.TAG }} nao bate com versionName=$GRADLE_VERSION no build.gradle.kts"
            exit 1
          fi

      - name: Decode keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build release APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_version.outputs.TAG }}"
          gh release create "$TAG" \
            --title "haval-dock-${{ steps.get_version.outputs.VERSION }}" \
            --generate-notes \
            app/build/outputs/apk/release/app-release.apk \
          || gh release upload "$TAG" \
               app/build/outputs/apk/release/app-release.apk \
               --clobber
