name: Init keystore (one-off)

# Gera UMA vez um keystore dedicado do Haval Dock e sobe como artifact (privado).
# Rodar manualmente, baixar o artifact, setar os secrets SIGNING_* e depois apagar
# este workflow. Mantém o repo PRIVADO enquanto o artifact existir.

on:
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          mkdir -p out
          PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | cut -c1-24)
          echo "::add-mask::$PASS"
          ALIAS=havaldock
          keytool -genkeypair -v \
            -keystore out/release.keystore -storetype PKCS12 \
            -alias "$ALIAS" -keyalg RSA -keysize 4096 -validity 10000 \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=Haval Dock, OU=leandrosavn, O=leandrosavn, C=BR"
          base64 -w0 out/release.keystore > out/release.keystore.b64
          {
            echo "SIGNING_KEY_ALIAS=$ALIAS"
            echo "SIGNING_STORE_PASSWORD=$PASS"
            echo "SIGNING_KEY_PASSWORD=$PASS"
          } > out/secrets.env

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: out/
          retention-days: 1
