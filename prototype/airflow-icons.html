<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/>
<title>Fluxo de ar — ícones</title>
<style>
  body{margin:0;background:#06090c;font-family:'Segoe UI',sans-serif;color:#eef4f8;}
  h2{font-weight:700;letter-spacing:.5px;padding:22px 26px 4px;margin:0;}
  .sub{color:#828c9c;font-size:14px;padding:0 26px 18px;}
  .row{display:flex;flex-wrap:wrap;gap:8px;padding:10px 18px;}
  .card{width:210px;padding:24px 14px;text-align:center;border:1px solid #1c2531;border-radius:16px;background:#0e131b;}
  .lbl{font-size:16px;font-weight:800;color:#2de0f0;letter-spacing:1px;margin-top:14px;}
  .big{height:96px;display:flex;align-items:center;justify-content:center;}
  .big svg{width:84px;height:84px;color:#2de0f0;}
  .small{margin-top:14px;}
  .small svg{width:34px;height:34px;color:#2de0f0;}
  .cap{font-size:11px;color:#5b6471;display:block;margin-top:6px;}
  /* simula a barra: seletor exclusivo */
  .bar{margin:26px;padding:14px 20px;background:linear-gradient(180deg,rgba(6,9,12,.55),rgba(6,9,12,.94));
       border-top:2px solid #2de0f0;border-radius:8px;display:inline-flex;align-items:center;gap:6px;}
  .bar button{appearance:none;border:0;background:transparent;cursor:pointer;padding:6px;border-radius:11px;
              display:grid;place-items:center;color:#5b6471;transition:.12s;}
  .bar button svg{width:32px;height:28px;display:block;color:inherit;}
  .bar button:hover{color:#aeb6c2;}
  .bar button.on{color:#2de0f0;background:rgba(45,224,240,.14);box-shadow:0 0 0 1px rgba(45,224,240,.45),0 0 12px rgba(45,224,240,.22);}
</style></head><body>
<h2>Fluxo de ar — 5 posições (um controle que cicla)</h2>
<div class="sub">Toque para avançar: rosto → rosto+pés → pés → pés+para-brisa → para-brisa</div>
<div class="row" id="row"></div>
<h2 style="padding-top:6px;">Como fica na barra (seleção mutuamente exclusiva)</h2>
<div class="sub">Clique para selecionar — só uma posição fica acesa por vez.</div>
<div class="bar" id="bar"></div>
<script>
var P='<circle cx="14.6" cy="6.4" r="2.6"/><path d="M12.1 9.6C12.1 9.6 12.5 9.4 13.1 9.4L16 9.4C16.6 9.4 17 9.8 17 10.4L17 13.2L20.6 13.2C21.1 13.2 21.5 13.6 21.5 14.15C21.5 14.7 21.1 15.1 20.6 15.1L15.2 15.1C13.5 15.1 12.1 13.7 12.1 12Z"/>';
var AF='<path d="M2.6 12.8L7 7.2" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/><path d="M8.6 5.4L4.6 6L6.6 9.2Z"/>';
var AFt='<path d="M2.6 8.4L7 14" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/><path d="M8.6 15.8L4.6 15.2L6.6 12Z"/>';
var W='<path d="M4.4 18C4.4 14.4 8 12.8 12 12.8C16 12.8 19.6 14.4 19.6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M8 11.8V6M6.4 7.6L8 5.6L9.6 7.6"/><path d="M12 11.8V5M10.4 6.6L12 4.6L13.6 6.6"/><path d="M16 11.8V6M14.4 7.6L16 5.6L17.6 7.6"/></g>';
var Wsm='<path d="M2 9.2C2 7.4 3.8 6.4 5.6 6.4C7.4 6.4 9.2 7.4 9.2 9.2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><g fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M3.7 5.8V3.2M2.9 4L3.7 3L4.5 4"/><path d="M5.6 5.8V2.8M4.8 3.6L5.6 2.6L6.4 3.6"/><path d="M7.5 5.8V3.2M6.7 4L7.5 3L8.3 4"/></g>';
function svg(inner){return '<svg viewBox="0 0 24 24" fill="currentColor">'+inner+'</svg>';}
var AIR=[
  {l:'ROSTO',        s:svg(AF+P)},
  {l:'ROSTO+PÉS',    s:svg(AF+AFt+P)},
  {l:'PÉS',          s:svg(AFt+P)},
  {l:'PÉS+P.BRISA',  s:svg(AFt+P+Wsm)},
  {l:'PÁRA-BRISA',   s:svg(W)}
];
document.getElementById('row').innerHTML=AIR.map(a=>'<div class="card"><div class="big">'+a.s+'</div><div class="small">'+a.s+'<span class="cap">tamanho real</span></div><div class="lbl">'+a.l+'</div></div>').join('');
var bar=document.getElementById('bar'); var sel=0;
function drawBar(){ bar.innerHTML=AIR.map((a,k)=>'<button data-k="'+k+'" class="'+(k===sel?'on':'')+'" title="'+a.l+'">'+a.s+'</button>').join('');
  bar.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{ sel=+b.dataset.k; drawBar(); })); }
drawBar();
</script></body></html>
