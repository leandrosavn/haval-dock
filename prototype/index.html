<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Haval Dock — toolbar inferior (mockup)</title>
<style>
  :root{
    --bg0:#08090b; --bg1:#11141a; --card:#161b24; --card2:#121722;
    --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.13);
    --txt:#eef2f8; --muted:#9099a8; --muted2:#5f6776;
    --accent:#19e3b1; --accent2:#0bb69a; --accentSoft:#5ff0cf;
    --glow:25,227,177; --onAccent:#04140f;
    --radius:22px; --radius-sm:16px;
    --shadow:0 20px 55px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; background:#000; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; overflow:hidden;}
  #fit{position:fixed; inset:0; overflow:hidden; background:#000;}
  #stage{
    width:1920px; height:720px; position:absolute; top:0; left:0; transform-origin:top left; color:var(--txt);
    background:
      radial-gradient(1200px 620px at 80% -12%, rgba(var(--glow),.14), transparent 60%),
      radial-gradient(900px 520px at 6% 120%, rgba(var(--glow),.09), transparent 60%),
      linear-gradient(160deg,var(--bg1),var(--bg0));
  }
  #stage.light{
    --bg0:#e7ebf1; --bg1:#f6f8fb; --card:#ffffff; --card2:#eef2f7;
    --line:rgba(20,30,50,.10); --line2:rgba(20,30,50,.17);
    --txt:#1b2230; --muted:#5d6675; --muted2:#9aa4b2;
  }

  /* ---- faux mediacenter / CarPlay por trás (só p/ dar contexto: a barra é um overlay) ---- */
  .scene{position:absolute; inset:0;}
  .scene .topchrome{position:absolute; top:0; left:0; right:0; height:64px; display:flex; align-items:center; gap:18px; padding:0 36px; color:var(--muted); border-bottom:1px solid var(--line);}
  .scene .topchrome .time{font-size:24px; font-weight:800; color:var(--txt); letter-spacing:.5px;}
  .scene .topchrome .tp{font-size:16px; font-weight:600;}
  .scene .topchrome .tp b{color:var(--accentSoft); font-weight:800; margin-right:4px;}
  .scene .topchrome .spacer{flex:1;}
  .scene .map{position:absolute; inset:64px 0 156px 0; overflow:hidden; opacity:.5;}
  .scene .map .road{position:absolute; height:30px; background:rgba(255,255,255,.05); border-top:1px solid var(--line); border-bottom:1px solid var(--line);}
  .scene .map .route{position:absolute; height:10px; border-radius:8px; background:linear-gradient(90deg,var(--accent2),var(--accent)); box-shadow:0 0 22px rgba(var(--glow),.4);}
  .scene .wm{position:absolute; inset:64px 0 156px 0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; color:var(--muted2); pointer-events:none;}
  .scene .wm .big{font-size:42px; font-weight:800; letter-spacing:1px; opacity:.5;}
  .scene .wm .sm{font-size:16px; letter-spacing:3px; text-transform:uppercase; opacity:.45;}

  /* ---- meta controles do protótipo (NÃO fazem parte do produto) ---- */
  .proto{position:absolute; top:14px; right:24px; display:flex; align-items:center; gap:12px; z-index:40;}
  .proto .tag{font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted2); font-weight:800;}
  .modeseg{display:flex; background:var(--card2); border:1px solid var(--line); border-radius:13px; padding:4px; gap:3px;}
  .modeseg button{appearance:none; border:0; background:transparent; color:var(--muted); font-size:15px; width:38px; height:32px; border-radius:9px; cursor:pointer; transition:.15s; display:grid; place-items:center;}
  .modeseg button.on{background:rgba(var(--glow),.16); color:var(--txt); box-shadow:0 0 0 1px rgba(var(--glow),.4);}
  .swatches{display:flex; gap:7px; align-items:center;}
  .sw{width:24px;height:24px;border-radius:50%; border:0; background:var(--c); cursor:pointer; padding:0; transition:.15s;}
  .sw:hover{transform:scale(1.08);}
  .sw.on{box-shadow:0 0 0 2px var(--bg0), 0 0 0 4px var(--c);}

  /* ---- A BARRA INFERIOR (o produto) ---- */
  .bar{
    position:absolute; left:0; right:0; bottom:0; height:76px;
    background:linear-gradient(180deg, rgba(8,10,14,.55), rgba(8,10,14,.92));
    border-top:1px solid var(--line2);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    box-shadow:0 -16px 44px rgba(0,0,0,.5);
    transition:transform .35s cubic-bezier(.2,.8,.2,1);
  }
  #stage.light .bar{background:linear-gradient(180deg, rgba(246,248,251,.7), rgba(246,248,251,.95));}
  .bar.hidden{transform:translateY(102%);}
  .tiles{display:flex; align-items:stretch; gap:0; padding:7px 18px; height:100%;}
  /* barrinha de contagem (some quando zera; reinicia a cada toque) */
  .countdown{position:absolute; top:0; left:0; height:3px; width:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); box-shadow:0 0 10px rgba(var(--glow),.6);}
  .countdown.off{display:none;}
  /* alça p/ revelar a barra quando auto-oculta */
  .reveal{position:absolute; left:50%; bottom:0; transform:translateX(-50%); display:none; align-items:center; gap:8px;
          padding:9px 22px 11px; border-radius:14px 14px 0 0; background:rgba(8,10,14,.92); border:1px solid var(--line2); border-bottom:0;
          color:var(--accentSoft); font-size:15px; font-weight:800; cursor:pointer; z-index:5; backdrop-filter:blur(14px);}
  .reveal.show{display:flex;}
  #stage.light .reveal{background:rgba(246,248,251,.95);}

  .tile{
    flex:1; min-width:0; display:flex; flex-direction:row; align-items:center; justify-content:center; gap:10px;
    padding:6px 8px; border-radius:12px; cursor:default; transition:.14s; border:1px solid transparent;
  }
  .tile:hover{background:rgba(var(--glow),.06); border-color:var(--line);}
  .tile .ic{width:22px; height:22px; color:var(--accentSoft); display:grid; place-items:center; flex:none;}
  .tile .ic svg{width:22px; height:22px;}

  .tbody{display:flex; align-items:center; justify-content:center; gap:7px;}

  /* stepper */
  .step{appearance:none; border:1px solid var(--line2); background:var(--card2); color:var(--txt);
        width:30px; height:30px; border-radius:9px; font-size:20px; font-weight:300; line-height:1;
        cursor:pointer; display:grid; place-items:center; transition:.12s; flex:none;}
  .step:hover{border-color:var(--accent); color:var(--accentSoft);}
  .step:active{transform:scale(.92); background:rgba(var(--glow),.12);}
  .val{display:flex; flex-direction:column; align-items:center; gap:3px; min-width:46px;}
  .val .num{font-size:20px; font-weight:800; color:var(--txt); font-variant-numeric:tabular-nums; line-height:1;}
  .val .segbar{display:flex; gap:3px;}
  .val .segbar i{width:6px; height:6px; border-radius:2px; background:var(--card2); border:1px solid var(--line2);}
  .val .segbar i.on{background:var(--accent); border-color:transparent; box-shadow:0 0 7px rgba(var(--glow),.55);}

  /* cycle */
  .tile.cycle{cursor:pointer;}
  .tile.cycle:hover{background:rgba(var(--glow),.09); border-color:rgba(var(--glow),.3);}
  .cycle .tbody{flex-direction:column; gap:5px;}
  .cycle .mode{font-size:17px; font-weight:800; color:var(--accentSoft); line-height:1; text-align:center;}
  .cycle .dots{display:flex; gap:5px; justify-content:center;}
  .cycle .dots i{width:6px; height:6px; border-radius:50%; background:var(--card2); border:1px solid var(--line2);}
  .cycle .dots i.on{background:var(--accent); border-color:transparent; box-shadow:0 0 7px rgba(var(--glow),.55);}

  /* toggle */
  .tile.toggle{cursor:pointer;}
  .toggle .pill{font-size:14px; font-weight:800; color:var(--muted); padding:6px 14px; border-radius:11px;
                border:1px solid var(--line2); background:var(--card2); transition:.14s;}
  .tile.toggle.on .pill{color:var(--onAccent); background:linear-gradient(180deg,var(--accent),var(--accent2)); border-color:transparent;}
  .tile.toggle.on .ic{color:var(--accent);}

  .divider{flex:none; width:1px; align-self:center; height:44px; background:var(--line2); margin:0 7px;}

  /* atalho de configurações (no app real = ícone do app na central que abre esta tela) */
  .gear{position:absolute; top:16px; right:20px; z-index:40; display:flex; align-items:center; gap:9px;
        background:var(--card2); border:1px solid var(--line2); color:var(--muted); border-radius:13px; padding:9px 15px; font-size:14px; font-weight:700; cursor:pointer;}
  .gear:hover{border-color:var(--accent); color:var(--accentSoft);}
  .gear svg{width:18px; height:18px;}
  .gear .gtag{font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted2);}

  /* tela de Configurações (Activity própria, aberta pelo ícone na central) */
  .settings{position:absolute; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:60;}
  .settings.show{display:flex;}
  .sheet{width:780px; background:linear-gradient(180deg,var(--card),var(--card2)); border:1px solid var(--line2); border-radius:24px; padding:30px 36px; box-shadow:var(--shadow);}
  .sheet h1{font-size:26px; font-weight:800; margin:0 0 4px; display:flex; align-items:center; gap:12px;}
  .sheet h1 svg{width:28px; height:28px; color:var(--accentSoft);}
  .sheet .sub{color:var(--muted); font-size:15px; margin-bottom:26px;}
  .sgroup{border-top:1px solid var(--line); padding-top:22px;}
  .sgroup .glabel{font-size:12px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--muted2); margin-bottom:18px;}
  .srow{display:flex; align-items:center; justify-content:space-between; gap:22px; margin-bottom:22px;}
  .srow .name{font-size:18px; font-weight:600;}
  .srow .name small{display:block; color:var(--muted); font-weight:500; font-size:14px; margin-top:4px;}
  .srow.disabled{opacity:.38; pointer-events:none;}
  .seg2{display:flex; background:var(--card2); border:1px solid var(--line); border-radius:14px; padding:5px; gap:4px; flex:none;}
  .seg2 button{appearance:none; border:0; background:transparent; color:var(--muted); font-weight:700; font-size:16px; padding:10px 24px; border-radius:10px; cursor:pointer; transition:.15s;}
  .seg2 button.on{background:linear-gradient(180deg,rgba(var(--glow),.26),rgba(var(--glow),.12)); color:#fff; box-shadow:0 0 0 1px rgba(var(--glow),.45);}
  .secs{display:flex; align-items:center; gap:12px; flex:none;}
  .secs .num{font-size:24px; font-weight:800; min-width:66px; text-align:center; font-variant-numeric:tabular-nums; color:var(--accentSoft);}
  .sheet .actions{display:flex; justify-content:flex-end; margin-top:6px;}
  .sheet .done{appearance:none; border:0; background:linear-gradient(180deg,var(--accent),var(--accent2)); color:var(--onAccent); font-weight:800; font-size:16px; padding:12px 28px; border-radius:14px; cursor:pointer;}
  /* seção de atualização (igual ao Haval Radio) */
  .step2{appearance:none; border:1px solid var(--line2); background:var(--card2); color:var(--txt); font-weight:700; font-size:15px; padding:10px 18px; border-radius:12px; cursor:pointer; transition:.14s; flex:none;}
  .step2:hover{border-color:var(--accent); color:var(--accentSoft);}
  .step2.primary{background:linear-gradient(180deg,var(--accent),var(--accent2)); color:var(--onAccent); border:0;}
  .step2:disabled{opacity:.5; cursor:default;}
  .srow .name small.ok{color:var(--accentSoft);}
  .pbar{flex:1; height:10px; border-radius:6px; background:var(--card2); border:1px solid var(--line); overflow:hidden;}
  .pbar > i{display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--accent2),var(--accent)); transition:width .15s;}
</style>
</head>
<body>
<div id="fit"><div id="stage">

  <!-- header e meio ficam VAZIOS de propósito: o overlay só desenha a faixa de baixo
       (o resto da tela é o mediacenter / mapa / CarPlay aparecendo por trás) -->

  <!-- Config NÃO tem atalho na tela: no app real abre só pelo ícone do app na central.
       No protótipo, abra com a tecla "C" (ou ?#settings na URL). A barra fica 100% sozinha. -->

  <!-- ===== A BARRA INFERIOR (único elemento do produto) ===== -->
  <div class="bar" id="bar">
    <div class="countdown off" id="cd"></div>
    <div class="tiles" id="tiles"></div>
  </div>

  <!-- alça p/ revelar a barra quando estiver auto-oculta -->
  <button class="reveal" id="reveal">&#9650; Haval Dock</button>

  <!-- tela de Configurações -->
  <div class="settings" id="settings">
    <div class="sheet">
      <h1><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.7-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg> Haval Dock</h1>
      <div class="sub">Configurações &middot; abertas pelo ícone do app na central</div>
      <div class="sgroup">
        <div class="glabel">Barra inferior</div>
        <div class="srow">
          <div class="name">Visibilidade<small>Sempre na tela, ou some sozinha após inatividade.</small></div>
          <div class="seg2" id="visSeg">
            <button data-mode="always">Sempre visível</button>
            <button data-mode="auto">Auto-ocultar</button>
          </div>
        </div>
        <div class="srow" id="secsRow">
          <div class="name">Ocultar após<small>O tempo reinicia a cada toque na barra.</small></div>
          <div class="secs">
            <button class="step" id="secMinus" aria-label="menos">&#8722;</button>
            <span class="num" id="secsNum">10s</span>
            <button class="step" id="secPlus" aria-label="mais">+</button>
          </div>
        </div>
      </div>
      <div class="sgroup">
        <div class="glabel">Sobre e atualização</div>
        <div class="srow">
          <div class="name">Versão<small id="updMsg">Verifica a última release no GitHub.</small></div>
          <div class="secs">
            <span class="num" id="curVer" style="font-size:20px; color:var(--txt); min-width:auto">v0.1.0</span>
            <button class="step2" id="updCheck">Verificar</button>
            <button class="step2 primary" id="updDo" style="display:none">Baixar e instalar</button>
          </div>
        </div>
        <div class="srow" id="updProgRow" style="display:none; margin-bottom:6px;">
          <div class="pbar"><i id="pbarFill"></i></div>
          <span class="num" id="pPct" style="font-size:18px; min-width:56px">0%</span>
        </div>
      </div>
      <div class="actions"><button class="done" id="sDone">Concluir</button></div>
    </div>
  </div>

</div></div>

<script>
  /* ---- escala do palco (igual ao haval-radio) ---- */
  function fit(){
    const s=document.getElementById('stage');
    const k=Math.min(window.innerWidth/1920, window.innerHeight/720);
    const tx=(window.innerWidth-1920*k)/2, ty=(window.innerHeight-720*k)/2;
    s.style.transform='translate('+tx+'px,'+ty+'px) scale('+k+')';
  }
  addEventListener('resize',fit); addEventListener('load',fit); requestAnimationFrame(fit); fit();

  /* ---- ícones (SVG inline, herdam a cor de acento) ---- */
  function svg(inner){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+inner+'</svg>';}
  const ICONS={
    vol:   svg('<path d="M4 9h3l4-3v12l-4-3H4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18 6a9 9 0 0 1 0 12"/>'),
    seat:  svg('<path d="M9 3h2a3 3 0 0 1 3 3v6H6V6a3 3 0 0 1 3-3z"/><path d="M6 12h11a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2z"/><path d="M17 17v3"/><path d="M9.2 8l.8-.9.8.9"/>'),
    thermo:svg('<path d="M12 3a2 2 0 0 1 2 2v8.4a4 4 0 1 1-4 0V5a2 2 0 0 1 2-2z"/><path d="M12 9.5v5.5"/>'),
    regen: svg('<rect x="3" y="8" width="15" height="9" rx="1.6"/><path d="M19.5 11v3"/><path d="M10.6 9.6L8.4 13H11l-1 3.4L13.2 12H10.6z"/>'),
    steer: svg('<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.2"/><path d="M12 14.2V21"/><path d="M10.1 13.1L4.5 16.5"/><path d="M13.9 13.1l5.6 3.4"/>'),
    car:   svg('<path d="M4 12l2-5a2 2 0 0 1 1.9-1.3h8.2A2 2 0 0 1 18 7l2 5"/><path d="M3 12h18v3a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><circle cx="7.5" cy="16.5" r="1.5"/><circle cx="16.5" cy="16.5" r="1.5"/>'),
    fan:   svg('<path d="M3 8h9a2.5 2.5 0 1 0-2.5-2.5"/><path d="M3 12h13a2.5 2.5 0 1 1-2.5 2.5"/><path d="M3 16h8a2 2 0 1 1-2 2"/>'),
    recirc:svg('<path d="M5 9a7 7 0 0 1 12-2"/><path d="M17 3v4h-4"/><path d="M19 15a7 7 0 0 1-12 2"/><path d="M7 21v-4h4"/>')
  };

  /* ---- config da barra (ordem ESQUERDA -> DIREITA = a sua lista) ---- */
  const TILES=[
    {type:'stepper', icon:'thermo', label:'Temp. motorista',    min:16,max:32, step:0.5, val:23, unit:'°', g:0},
    {type:'stepper', icon:'seat',   label:'Ventil. motorista',  min:0, max:3,  step:1,   val:0,  seg:true, g:0},
    {type:'stepper', icon:'fan',    label:'Veloc. ar-cond.',    min:0, max:7,  step:1,   val:3,  seg:true, g:1},
    {type:'toggle',  icon:'recirc', label:'Recirculador',       on:false, onTxt:'Recirc.', offTxt:'Externo', g:1},
    {type:'cycle',   icon:'car',    label:'Modo condução',      opts:['Normal','Eco','Sport','Neve'],        idx:0, g:2},
    {type:'cycle',   icon:'steer',  label:'Modo direção',       opts:['Conforto','Padrão','Esportivo'],      idx:1, g:2},
    {type:'cycle',   icon:'regen',  label:'Regeneração',        opts:['Baixo','Normal','Alto'],              idx:1, g:2},
    {type:'stepper', icon:'thermo', label:'Temp. passageiro',   min:16,max:32, step:0.5, val:22, unit:'°', g:3},
    {type:'stepper', icon:'seat',   label:'Ventil. passageiro', min:0, max:3,  step:1,   val:1,  seg:true, g:3},
    {type:'stepper', icon:'vol',    label:'Volume rádio',       min:0, max:30, step:1,   val:14, g:4}
  ];

  function fmt(t){
    if(t.unit){ return t.val.toFixed(1)+t.unit; }
    return String(t.val);
  }
  function segbar(t){
    if(!t.seg) return '';
    let s='<div class="segbar">';
    for(let i=1;i<=t.max;i++) s+='<i class="'+(i<=t.val?'on':'')+'"></i>';
    return s+'</div>';
  }
  function dots(t){
    let s='<div class="dots">';
    t.opts.forEach((o,i)=> s+='<i class="'+(i===t.idx?'on':'')+'"></i>');
    return s+'</div>';
  }
  function tbody(t){
    if(t.type==='stepper'){
      return '<button class="step minus" data-act="dec" aria-label="diminuir">&#8722;</button>'
           + '<div class="val"><span class="num">'+fmt(t)+'</span>'+segbar(t)+'</div>'
           + '<button class="step plus" data-act="inc" aria-label="aumentar">+</button>';
    }
    if(t.type==='cycle'){
      return '<div style="text-align:center;width:100%"><div class="mode">'+t.opts[t.idx]+'</div>'+dots(t)+'</div>';
    }
    return '<div class="pill">'+(t.on?t.onTxt:t.offTxt)+'</div>';
  }
  function render(){
    const wrap=document.getElementById('tiles'); wrap.innerHTML='';
    TILES.forEach((t,i)=>{
      if(i>0 && TILES[i-1].g!==t.g){ const d=document.createElement('div'); d.className='divider'; wrap.appendChild(d); }
      const el=document.createElement('div');
      el.className='tile '+t.type+(t.type==='toggle'&&t.on?' on':'');
      el.dataset.i=i;
      el.title=t.label;   // só dica (hover) — sem texto na barra
      el.innerHTML='<span class="ic">'+ICONS[t.icon]+'</span><div class="tbody">'+tbody(t)+'</div>';
      wrap.appendChild(el);
    });
  }

  /* ---- interação na barra (qualquer toque reseta o timer de inatividade) ---- */
  document.getElementById('bar').addEventListener('click',e=>{
    const tile=e.target.closest('.tile');
    if(tile){
      const t=TILES[+tile.dataset.i];
      if(t.type==='stepper'){
        const btn=e.target.closest('[data-act]');
        if(btn){ const d=(btn.dataset.act==='inc'?1:-1)*t.step; t.val=Math.min(t.max,Math.max(t.min, Math.round((t.val+d)*10)/10)); render(); }
      } else if(t.type==='cycle'){
        t.idx=(t.idx+1)%t.opts.length; render();
      } else {
        t.on=!t.on; render();
      }
    }
    activity();   // toque na barra = atividade -> zera a contagem
  });
  render();

  /* ---- visibilidade: sempre / auto-ocultar com timer de inatividade ---- */
  const cfg={ mode:'auto', secs:10 };       // 'always' | 'auto'
  let hideTimer=null;
  const bar=document.getElementById('bar'), cd=document.getElementById('cd'), reveal=document.getElementById('reveal');
  function showBar(){ bar.classList.remove('hidden'); reveal.classList.remove('show'); }
  function hideBar(){ bar.classList.add('hidden'); reveal.classList.add('show'); }
  function stopCount(){ cd.classList.add('off'); cd.style.transition='none'; cd.style.width='100%'; }
  function armTimer(){
    if(hideTimer){ clearTimeout(hideTimer); hideTimer=null; }
    if(cfg.mode!=='auto'){ stopCount(); return; }
    cd.classList.remove('off'); cd.style.transition='none'; cd.style.width='100%';   // reinicia visual cheio
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ cd.style.transition='width '+cfg.secs+'s linear'; cd.style.width='0%'; }));
    hideTimer=setTimeout(hideBar, cfg.secs*1000);
  }
  function activity(){ showBar(); armTimer(); }   // resetar contagem

  /* ---- tela de Configurações ---- */
  const settings=document.getElementById('settings');
  function applyCfg(){
    document.querySelectorAll('#visSeg button').forEach(b=>b.classList.toggle('on', b.dataset.mode===cfg.mode));
    document.getElementById('secsRow').classList.toggle('disabled', cfg.mode!=='auto');
    document.getElementById('secsNum').textContent=cfg.secs+'s';
    if(cfg.mode==='always'){ if(hideTimer){clearTimeout(hideTimer); hideTimer=null;} showBar(); stopCount(); }
    else { activity(); }
  }
  document.getElementById('sDone').addEventListener('click',()=>settings.classList.remove('show'));
  // sem atalho na tela: config abre só pelo ícone do app (no protótipo: tecla "C")
  addEventListener('keydown',e=>{ if(e.key==='c'||e.key==='C') settings.classList.toggle('show'); });
  settings.addEventListener('click',e=>{ if(e.target===settings) settings.classList.remove('show'); });
  document.querySelectorAll('#visSeg button').forEach(b=>b.addEventListener('click',()=>{ cfg.mode=b.dataset.mode; applyCfg(); }));
  document.getElementById('secMinus').addEventListener('click',()=>{ cfg.secs=Math.max(3,cfg.secs-1); applyCfg(); });
  document.getElementById('secPlus').addEventListener('click',()=>{ cfg.secs=Math.min(30,cfg.secs+1); applyCfg(); });
  reveal.addEventListener('click',activity);
  applyCfg();

  /* ---- updater in-app (mock; igual ao Haval Radio: lê releases do GitHub) ---- */
  (function(){
    const msg=document.getElementById('updMsg'), check=document.getElementById('updCheck'), doIt=document.getElementById('updDo');
    const progRow=document.getElementById('updProgRow'), fill=document.getElementById('pbarFill'), pct=document.getElementById('pPct');
    check.addEventListener('click',()=>{
      check.disabled=true; msg.className=''; msg.textContent='Verificando no GitHub…';
      setTimeout(()=>{ msg.className='ok'; msg.textContent='Nova versão v0.2.0 disponível'; check.style.display='none'; doIt.style.display=''; check.disabled=false; },800);
    });
    doIt.addEventListener('click',()=>{
      doIt.style.display='none'; msg.className=''; msg.textContent='Baixando…'; progRow.style.display='flex';
      let p=0; const t=setInterval(()=>{ p+=Math.max(4,Math.round(Math.random()*12));
        if(p>=100){ p=100; clearInterval(t); fill.style.width='100%'; pct.textContent='100%';
          setTimeout(()=>{ msg.className='ok'; msg.textContent='Baixado — abrindo instalador… (mock)'; progRow.style.display='none'; },300); return; }
        fill.style.width=p+'%'; pct.textContent=p+'%'; },140);
    });
  })();

  if(location.hash==='#settings') settings.classList.add('show');

  /* ---- tema claro/escuro + cores de acento (portado do haval-radio) ---- */
  const THEMES={
    teal:{accent:'#19e3b1',accent2:'#0bb69a',soft:'#5ff0cf',glow:'25,227,177',on:'#04140f'},
    cyan:{accent:'#22c3ff',accent2:'#0a93cc',soft:'#7adcff',glow:'34,195,255',on:'#04222e'},
    blue:{accent:'#3b82f6',accent2:'#1d5fd1',soft:'#8fb4ff',glow:'59,130,246',on:'#ffffff'},
    violet:{accent:'#a06bff',accent2:'#7b3fe4',soft:'#c5a3ff',glow:'160,107,255',on:'#ffffff'},
    pink:{accent:'#ff5fa2',accent2:'#d6356f',soft:'#ff9cc4',glow:'255,95,162',on:'#33091c'},
    red:{accent:'#ff3b46',accent2:'#c41020',soft:'#ff7a82',glow:'255,59,70',on:'#ffffff'},
    orange:{accent:'#ff8a3d',accent2:'#db6312',soft:'#ffb285',glow:'255,138,61',on:'#2e1500'},
    amber:{accent:'#ffb13c',accent2:'#e08a1e',soft:'#ffd089',glow:'255,177,60',on:'#2a1a00'}
  };
  const LS={get:(k,d)=>{try{return localStorage.getItem(k)||d;}catch(e){return d;}},set:(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}}};
  function applyTheme(t){const th=THEMES[t],r=document.documentElement.style;
    r.setProperty('--accent',th.accent); r.setProperty('--accent2',th.accent2);
    r.setProperty('--accentSoft',th.soft); r.setProperty('--glow',th.glow); r.setProperty('--onAccent',th.on);
    LS.set('dockAccent',t);}
  let acc=LS.get('dockAccent','teal'); if(!THEMES[acc]) acc='teal';
  applyTheme(acc);
</script>
</body>
</html>
