<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/>
<style>
  body{margin:0;background:#0a0e15;font-family:'Segoe UI',sans-serif;color:#eef4f8;display:flex;}
  .card{width:340px;padding:30px 16px;text-align:center;border-right:1px solid #1c2531;}
  .lbl{font-size:26px;font-weight:800;color:#2de0f0;}
  .desc{font-size:15px;color:#9099a8;margin:4px 0 22px;height:36px;}
  .big{height:110px;display:flex;align-items:center;justify-content:center;}
  .big svg{width:104px;height:104px;}
  .small{margin-top:16px;display:flex;align-items:center;justify-content:center;gap:14px;}
  .small svg{width:46px;height:46px;}
  .small .cap{font-size:12px;color:#5b6471;}
  svg{stroke:#2de0f0;}
</style></head><body>
<script>
function wrap(inner){return '<svg viewBox="0 0 24 24" fill="none" stroke="#2de0f0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+inner+'</svg>';}
var CAR='<path d="M3 14.5C3 13.6 3.7 13 4.7 13H5.5L7.7 9.5C8.1 8.8 8.8 8.4 9.7 8.4H14.2C15.2 8.4 16.1 8.9 16.6 9.8L18.4 13H19.3C20.3 13 21 13.6 21 14.5"/><path d="M3 14.5H5.3A1.7 1.7 0 0 0 8.7 14.5H14.6A1.7 1.7 0 0 0 18 14.5H21"/><circle cx="7" cy="15" r="1.7"/><circle cx="16.3" cy="15" r="1.7"/>';
// FECHADO (recirc): seta em U dentro, ponta pra direita
var CLOSED=CAR+'<path d="M14 11H10.8A1.6 1.6 0 0 0 10.8 14.2H13.6"/><path fill="#2de0f0" stroke="none" d="M13 12.7 15.1 14.2 13 15.7z"/>';
// ABERTO (ar de fora): seta reta -> + risco diagonal na frente
var OPEN=CAR+'<path d="M9 12.6H13.6"/><path fill="#2de0f0" stroke="none" d="M12.9 11 15 12.6 12.9 14.2z"/><path d="M6 13L10 7.9"/>';
var CARDS=[
 {l:'ABERTO', d:'ar de fora entra (recirc OFF) — seta entrando', s:OPEN},
 {l:'FECHADO', d:'recirculação (recirc ON) — seta em loop dentro', s:CLOSED},
];
document.body.innerHTML = CARDS.map(c=>'<div class="card"><div class="lbl">'+c.l+'</div><div class="desc">'+c.d+'</div><div class="big">'+wrap(c.s)+'</div><div class="small">'+wrap(c.s)+'<span class="cap">tamanho real</span></div></div>').join('');
</script></body></html>
